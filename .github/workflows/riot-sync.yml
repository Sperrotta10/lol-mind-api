name: Despertador Diario de Riot Data

on:
  schedule:
    # Se ejecuta todos los días a las 3:00 AM UTC
    - cron: '0 3 * * 5'
  workflow_dispatch: # Esto te pone un botón en GitHub para ejecutarlo a mano cuando quieras

jobs:
  ping-render:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar al Endpoint Secreto
        run: |
          curl -X POST ${{ secrets.RENDER_URL }} \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          --max-time 300