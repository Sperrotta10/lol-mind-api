services:
  - type: web
    name: lol-mind-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: "true"
